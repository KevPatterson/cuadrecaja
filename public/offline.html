<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexion - CuadreCaja</title>
    <style>
      :root {
        --bg: #f5f0e8;
        --ink: #0d0d0d;
        --muted: #4b5563;
        --warn: #b45309;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: linear-gradient(145deg, #f5f0e8 0%, #e9e1d3 100%);
        color: var(--ink);
        padding: 20px;
      }
      .card {
        width: min(560px, 100%);
        background: #fffaf2;
        border: 3px solid var(--ink);
        box-shadow: 8px 8px 0 var(--ink);
        padding: 22px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }
      .warn {
        color: var(--warn);
        font-weight: 700;
      }
      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 2px solid var(--ink);
        background: var(--ink);
        color: #fffaf2;
        padding: 10px 14px;
        cursor: pointer;
        font: inherit;
      }
      .ghost {
        background: #fffaf2;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sin conexion</h1>
      <p>Puedes seguir trabajando con los datos guardados localmente en este dispositivo.</p>
      <p class="warn">Algunas funciones en linea (como OCR con Gemini) no estaran disponibles.</p>
      <div class="actions">
        <button onclick="location.reload()">Reintentar</button>
        <button class="ghost" onclick="location.href='/nuevo-cuadre-wizard'">Ir al wizard</button>
      </div>
    </main>
  </body>
</html>
